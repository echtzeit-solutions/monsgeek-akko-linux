name: Release monsgeek-unbrick

on:
  push:
    tags:
      - 'unbrick-v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.5.0) — only needed for manual trigger"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Extract version from tag: unbrick-v0.5.0 → 0.5.0
            echo "version=${GITHUB_REF_NAME#unbrick-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust + Windows cross target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64 linker
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: unbrick
          workspaces: monsgeek-unbrick

      - name: Build release
        working-directory: monsgeek-unbrick
        run: cargo build --target x86_64-pc-windows-gnu --release

      - name: Rename binary
        run: |
          cp monsgeek-unbrick/target/x86_64-pc-windows-gnu/release/monsgeek-unbrick.exe \
             monsgeek-unbrick-v${{ steps.version.outputs.version }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unbrick-v${{ steps.version.outputs.version }}
          name: "monsgeek-unbrick v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## MonsGeek Keyboard Recovery Tool v${{ steps.version.outputs.version }}

            Double-click the .exe on a Windows machine with the keyboard in DFU mode (BOOT0 bridged to 3.3V).

            **Recovery options:** factory reset, flash stock v407/v408/v402, deep reset,
            custom firmware, full bootloader recovery, device info, flash dump.

            No installation required — single standalone .exe.
          files: monsgeek-unbrick-v${{ steps.version.outputs.version }}.exe
          draft: false
          prerelease: false
